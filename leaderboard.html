<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUST Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-name">TRUST</div>
          <div class="brand-sub">2x2 leaderboard</div>
        </div>
      </div>
      <nav class="nav">
        <a href="./index.html">Главная</a>
        <a href="./app.html">Играть</a>
        <a class="active" href="./leaderboard.html">Лидерборд</a>
      </nav>
      <div class="actions">
        <button class="btn primary" id="lbLoginBtn">Войти через Steam</button>
      </div>
    </div>
  </header>
  <main class="container app-shell">
    <section class="card">
      <span class="badge">SEASON 1</span>
      <h1 style="margin:16px 0 10px;font-size:48px;letter-spacing:-.06em">Лидерборд TRUST 2x2</h1>
      <p class="muted">Топ игроков по Elo. Рейтинг считается на backend и одинаков для сайта и launcher.</p>
    </section>
    <section class="card" style="margin-top:18px">
      <div class="table-head"><div>#</div><div>Игрок</div><div>Elo</div></div>
      <div class="list" id="leaderboardRows"></div>
    </section>
  </main>
  <script src="./frontend-config.js"></script>
  <script src="./leaderboard.js"></script>
</body>
</html>
