<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUST Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-name">TRUST</div>
          <div class="brand-sub" data-i18n="brand_sub">2x2 leaderboard</div>
        </div>
      </div>
      <nav class="nav">
        <a href="./index.html" data-i18n="nav_home">Home</a>
        <a href="./app.html" data-i18n="nav_play">Play</a>
        <a class="active" href="./leaderboard.html" data-i18n="nav_leaderboard">Leaderboard</a>
      </nav>
      <div class="actions app-header-actions">
        <div class="lang-switch" aria-label="Language switch">
          <button type="button" class="lang-btn active" data-lang="en">ENG</button>
          <button type="button" class="lang-btn" data-lang="ru">RU</button>
        </div>
        <button class="btn primary" id="lbLoginBtn" data-i18n="login">Sign in with Steam</button>
      </div>
    </div>
  </header>
  <main class="container app-shell">
    <section class="card">
      <span class="badge" data-i18n="season_badge">SEASON 1</span>
      <h1 style="margin:16px 0 10px;font-size:48px;letter-spacing:-.06em" data-i18n="hero_title">TRUST 2x2 leaderboard</h1>
      <p class="muted" data-i18n="hero_text">Top players by Elo. The rating is calculated on the backend and shared between the website and launcher.</p>
    </section>
    <section class="card" style="margin-top:18px">
      <div class="table-head"><div>#</div><div data-i18n="col_player">Player</div><div data-i18n="col_rank">Rank</div><div>Elo</div></div>
      <div class="list" id="leaderboardRows"></div>
    </section>
  </main>
  <script src="./frontend-config.js"></script>
  <script src="./leaderboard.js"></script>
</body>
</html>
