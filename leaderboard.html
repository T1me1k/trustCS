<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUST Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell leaderboard-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-name">TRUST</div>
          <div class="brand-sub">2x2 leaderboard</div>
        </div>
      </div>

      <nav class="top-nav">
        <a href="./index.html">Главная</a>
        <a href="./app.html">Играть</a>
      </nav>

      <div class="top-actions">
        <button id="lbLoginBtn" class="btn primary">Войти</button>
      </div>
    </header>

    <main>
      <section class="leaderboard-header card">
        <span class="badge">SEASON 1</span>
        <h1>Лидерборд TRUST 2x2</h1>
        <p class="muted">Топ игроков по Elo. Рейтинг считается на backend и одинаков для сайта и launcher.</p>
      </section>

      <section class="card">
        <div class="table-head">
          <div>#</div>
          <div>Игрок</div>
          <div>Elo</div>
        </div>
        <div id="leaderboardRows" class="table-body"></div>
      </section>
    </main>
  </div>

  <script src="./leaderboard.js"></script>
</body>
</html>
